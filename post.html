<!DOCTYPE html>
<html lang="pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treview</title>
</head>
    <body>
        <header>
            <a href="index.html">
                <img src="img/voltar.png" alt="voltar">
            </a>
            <h1>Criar avaliação</h1>
        </header>
        <main>
            <ul>
                <li>
                    Nome do restaurante:
                    <input type="search" placeholder="Procurar">
                </li>
                <li>
                    Endereço:
                    <input type="search" placeholder="Preenchimento automático">
                </li>
                <li>
                    Nota comida: 0/10
                    ☆☆☆☆☆☆☆☆☆☆
                </li>
                <li>
                    Nota serviço: 0/10
                    ☆☆☆☆☆☆☆☆☆☆
                </li>
                <li>
                    Preço pago por pessoa:
                    <input type="range">
                </li>
                <li>
                    <input type="text" placeholder="Conte sua experiência">
                </li>
                <li>
                    Adicione uma foto:
                    <input type="file">
                </li>
            </ul>
            <button>Postar</button>
        </main>
        <footer>
            <ul>
                <li>
                    <a href="index.html">
                        <img src="img/home.png" alt="home">

                <li>

                    </a>
                </li>
                <li>
                    <a href="post.html">
                        <img src="img/post.png" alt="criar avaliação">
                    </a>
                </li>
                <li>
                    <a href="#">
                        <img src="img/chat.png" alt="bate-papo">
                    </a>
                </li>
                <li>
